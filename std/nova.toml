# nova.toml — Nova standard library.
#
# Это workspace-member корневого `../nova.toml`. Содержит
# стандартную библиотеку Nova, организованную по семантическим
# доменам (см. spec/decisions/07-modules.md раздел «Структура
# nova-lang репозитория» в D78).
#
# **Plan 91 Ф.7.1 (2026-05-27):** для релиза 0.1 stdlib разделён
# на MVP (compiles → ships) и `_experimental/` (legacy/aspirational
# код, не входит в 0.1 release contract).
#
# MVP для 0.1 (релизный набор):
#   prelude/        Option/Result/protocols/effects/errors (auto-imported)
#   runtime/        char/fibers/gc/math/numeric/buffers/string/sync (auto-gen stubs)
#   testing/        handlers/property (test harness)
#   collections/    Vec ([]T ext methods), HashMap, Set, Range
#   encoding/       JSON, Base64
#   time/           Duration
#   net/            TcpListener, TcpStream, UdpSocket, SocketAddr (Plan 83.12)
#   concurrency/    Cancellation, Timer (Plan 83 fiber-api)
#   bench           Plan 57 benchmark DSL
#
# _experimental/ (не входит в 0.1, ждёт Plan 18 / 0.2+ или
# отдельных под-планов Plan 91 Ф.2-Ф.4 для постепенной promotion):
#   collections/    BloomFilter, Deque, LinkedList, LRU, PriorityQueue, Queue
#   crypto/         MD5, SHA-1, SHA-256, HMAC, JWT, bcrypt (4 файла FAIL: array literal)
#   encoding/       CSV, Hex, INI, TOML (stack overflow), URL
#   identifiers/    UUID, ULID, Snowflake, UuidNamespace
#   checksums/      CRC32, FNV
#   time/           Cron (FAIL: D52 §2)
#   path/           Path, Glob (Plan 18 → 0.2+)
#   math/           Complex (FAIL: D52 §2), Statistics
#   text/           Regex (FAIL: D52 §2), Markdown, Diff
#   data/           SemVer, SemVerRange, SQL
#   concurrency/    RateLimiter, Retry (FAIL: unused prefix typevar)
#
# Префикс `_` в имени каталога означает auto-skip из `nova check`
# (см. should_skip_path_full в nova-cli). Это даёт `nova check std/`
# → 0 FAIL для shipping CI gate без необходимости `--skip` flag.
#
# Module path 1:1 = file path: файл `std/encoding/base64.nv`
# объявляет `module std.encoding.base64` (или `encoding.base64`
# для sub-dir form). Имя папки `std/` ↔ префикс модуля `std.` без
# специальных маппингов (см. D78 «Path / module enforcement»).

[package]
name = "std"
version = "0.1.0"
nova-version = "0.5"
license = "MIT OR Apache-2.0"
description = "Стандартная библиотека Nova"
repository = "https://github.com/nv-lang/nova.git"

# Корень — текущий каталог `.`. Файлы лежат в подкаталогах прямо
# в std/<домен>/, не в std/src/.
[lib]
src = "."

# Plan 71 / D127: opt-in строгий enforcement правила
# `public-missing-stability` (Plan 45 §11.5 №7). Severity →
# `error`, что блокирует `nova doc --check` (exit 1) и CI gate
# при каждом exported item без `#stable`/`#unstable`/`#experimental`
# annotation. Stdlib обязан документировать stability tier на каждом
# элементе публичного API (semver commitments). User crates по
# умолчанию (без этого flag'а) получают `warning`, который видим
# в stderr, но не блокирует CI.
enforce-stability = true

# Stdlib не имеет внешних зависимостей — использует только
# prelude и собственные модули.
[dependencies]
