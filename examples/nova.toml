# nova.toml — Nova examples package.
#
# Это workspace-member корневого `../nova.toml`. Содержит
# демонстрационные программы и tutorial snippets, организованные
# по подкаталогам:
#
#   basics/         Hello, arithmetic, match, records, strings
#   effects/        Эффекты и handler'ы (D61, D63, D64)
#   real-world/     Полноразмерные примеры (audit, orm, oxsar_port)
#   effect-density/ Микросервис-сценарий для измерения «плотности
#                   эффектов» в реальном коде
#
# Стандартная библиотека (черновики и production-код) живёт в
# отдельном workspace-member `std/` — см. spec/decisions/07-modules.md
# раздел «Структура nova-lang репозитория» в D78.

[package]
name = "nova_examples"
version = "0.1.0"
nova-version = "0.5"
license = "MIT OR Apache-2.0"
description = "Демонстрационные программы и tutorial snippets Nova"
repository = "https://github.com/nova-lang/nova"

# Корень — текущий каталог `.` вместо стандартного `src/`,
# потому что demo-файлы лежат в подкаталогах прямо в examples/,
# не в examples/src/.
[lib]
src = "."

# Зависимостей пока нет — каждый demo-файл self-contained, использует
# только prelude. Когда examples начнут импортировать std-модули
# (например, std.encoding.json или std.crypto.sha256) — здесь
# появится `std = { path = "../std" }`.
[dependencies]
