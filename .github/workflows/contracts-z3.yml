name: contracts-z3

# Ф.5.2 (Plan 33.6): Z3 backend CI matrix.
#
# Прогоняет тесты помеченные REQUIRES_SMT_BACKEND=z3 через Z3 backend.
# Дополняет основной CI (TrivialBackend) — оба должны быть зелёными.
#
# Требует: libz3 доступна в runner'е (ubuntu — via apt, windows — vcpkg).

on:
  pull_request:
    paths:
      - "compiler-codegen/src/verify/**"
      - "nova_tests/contracts/**"
      - ".github/workflows/contracts-z3.yml"
  push:
    branches: [main]

jobs:
  contracts-trivial:
    name: contracts / TrivialBackend (default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install system deps
        run: sudo apt-get install -y libgc-dev
      - name: Build nova-cli (release, no z3)
        run: cargo build --release --manifest-path nova-cli/Cargo.toml
      - name: Run contracts tests (TrivialBackend)
        run: ./nova-cli/target/release/nova test . --filter contracts

  contracts-z3:
    name: contracts / Z3 backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install system deps
        run: sudo apt-get install -y libgc-dev libz3-dev
      - name: Build nova-cli (release, z3-backend feature)
        run: cargo build --release --features z3-backend --manifest-path nova-cli/Cargo.toml
      - name: Run contracts tests with Z3
        env:
          NOVA_SMT_BACKEND: z3
        run: ./nova-cli/target/release/nova test . --filter contracts

  # Plan 33.8 Ф.7: soundness-regression-suite ratchet.
  # Тесты с маркером `// SOUNDNESS_REGRESSION` стерегут закрытые
  # soundness-дыры. Они исполняются в задачах contracts-* выше; этот
  # job — анти-удаление: число guard-тестов не должно убывать.
  # При добавлении нового soundness-теста — поднять порог.
  soundness-regression-guard:
    name: contracts / soundness-regression guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Soundness-regression suite must not shrink
        run: |
          COUNT=$(grep -rl "SOUNDNESS_REGRESSION" nova_tests/ | wc -l)
          echo "soundness-regression guard tests: $COUNT"
          MIN=12
          if [ "$COUNT" -lt "$MIN" ]; then
            echo "ERROR: soundness-regression suite shrank below $MIN."
            echo "Soundness guard-тест удалён или потерял маркер. См. Plan 33.8 Ф.7."
            exit 1
          fi
