[package]
name = "nova"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Nova language CLI — build, run, test Nova programs"
publish = false

[[bin]]
name = "nova"
path = "src/main.rs"

[dependencies]
clap         = { version = "4", features = ["derive"] }
anyhow       = "1"
nova_codegen = { path = "../compiler-codegen", package = "nova-codegen" }

[profile.dev]
opt-level = 0

[profile.release]
opt-level = 2
lto = "thin"
