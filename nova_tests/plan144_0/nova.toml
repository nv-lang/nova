# nova.toml — scoped FFI manifest for Plan 144.0 may-GC effect-analysis tests.
#
# Force-includes the header-only `p144_ffi_shim.h` shim so the FFI negative
# fixture (`negative_ffi_call.nv`) has a real linkable extern target
# (`p144_c_add`). The shim is `static inline` → dead-code-eliminated in every
# other fixture of this package (zero cost). Pattern mirrors
# `plan143_2/nova.toml` (the sibling preempt-elision suite that shares this
# call-graph infrastructure).
#
# package name = "plan144_0" matches `module plan144_0.<file>` (D78: package +
# src="." → module identity unchanged).

[package]
name = "plan144_0"
version = "0.1.0"
license = "MIT OR Apache-2.0"
description = "Plan 144.0 may-GC effect-analysis positive+negative fixtures"

[lib]
src = "."

[dependencies]

[ffi]
c_shims      = ["p144_ffi_shim.h"]
include_dirs = []
libs         = []
