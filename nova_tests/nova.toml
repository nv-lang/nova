# nova.toml — Nova test suite for bootstrap compiler.
#
# Workspace-member корневого `../nova.toml`. Содержит тесты языка,
# которые прогоняются bootstrap-компилятором (`nova test ...`)
# для проверки корректности парсера, type-checker'а, интерпретатора.
#
# Структура — иерархическая по тематическим областям spec'а
# (D29-compliant):
#   basics/       — фундаментальный syntax (literals, operators, ...)
#   types/        — система типов (records, sum-types, generics, ...)
#   syntax/       — pattern matching, methods, closures, ...
#   effects/      — Fail / handlers / forbid / realtime
#   concurrency/  — supervised / parallel for / cancel_scope / Time
#   runtime/      — From/Into, Mem effect, StringBuilder/WriteBuffer/ReadBuffer, Option/Result
#   modules/      — cross-module integration
#
# Каждый файл — отдельный модуль `nova_tests.<group>.<file>` с
# `test "..." { }` блоками.

[package]
name = "nova_tests"
version = "0.1.0"
nova-version = "0.5"
license = "MIT OR Apache-2.0"
description = "Тесты языка Nova для bootstrap-компилятора"

[lib]
src = "."

[dependencies]

# Plan 115 D214 [M-115-ffi-build-pipeline]: user FFI shim files declared
# в [ffi] секции автоматически force-include'аются (для header .h) или
# линкуются (для .c) в каждом тестовом TU. Paths относительно этого
# nova.toml. Plan 115 V1 объявляет user-side sqlite shim из examples/ffi/ —
# тесты в `nova_tests/plan115/t4_sqlite_e2e_ok.nv` exerc'ируют его через
# external fn declarations.
#
# Header sqlite_mini_ffi.h это `static inline` функции — dead-code-eliminated
# linker'ом в тестах которые их не используют. Zero runtime cost.
[ffi]
c_shims      = ["../examples/ffi/sqlite_mini_ffi.h"]
include_dirs = []
libs         = []
